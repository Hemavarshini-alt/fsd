<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Home & About</title>

  <style>
    /* ===== RESET ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      scroll-behavior: smooth;
    }

    /* ===== NAVBAR ===== */
    nav {
      background: #1e3c72;
      padding: 15px;
      text-align: center;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin: 0 15px;
      font-size: 18px;
      font-weight: bold;
    }

    nav a:hover {
      text-decoration: underline;
    }

    /* ===== SECTION STYLE ===== */
    section {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      text-align: center;
      padding: 20px;
    }

    /* ===== HOME ===== */
    #home {
      background: linear-gradient(135deg, #a7abbe, #764ba2);
      color: white;
    }

    #home h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    #home p {
      font-size: 18px;
      margin-bottom: 20px;
    }

    /* ===== ABOUT ===== */
    #about {
      background: #f4f6ff;
      color: #333;
    }

    #about h1 {
      font-size: 36px;
      color: #2a5298;
      margin-bottom: 10px;
    }

    #about p {
      font-size: 18px;
      max-width: 500px;
    }

    /* ===== BUTTON ===== */
    .btn {
      margin-top: 15px;
      padding: 10px 20px;
      background: #ff7eb3;
      color: white;
      border: none;
      border-radius: 6px;
      text-decoration: none;
      font-size: 16px;
      transition: 0.3s;
    }

    .btn:hover {
      background: #ff4f8b;
    }

  </style>
</head>

<body>

  <!-- ===== NAVBAR ===== -->
  <nav>
    <a href="#home">Home</a>
    <a href="#about">About</a>
  </nav>

  <!-- ===== HOME SECTION ===== -->
  <section id="home">
    <h1>🏠 Welcome to Home Page</h1>
    <p>This is a simple and beautiful web page using HTML & CSS.</p>
    <a href="#about" class="btn">Go to About</a>
  </section>

  <!-- ===== ABOUT SECTION ===== -->
  <section id="about">
    <h1>ℹ️ About Page</h1>
    <p>
      This is a simple and beautiful web page using HTML & CSS.
    </p>
    <a href="#home" class="btn">Back to Home</a>
  </section>

</body>
</html>
